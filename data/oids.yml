# data/oids.yml — Canonical NIST PQC OID registry.
#
# Single source of truth for built-in OID metadata (dotted strings,
# key sizes, algorithm family, standard reference, security level).
#
# To add a new algorithm:
#   1. Add an entry below.
#   2. Add the Ruby constant to lib/pqc_asn1/oid.rb.
#   3. Run `bundle exec rake codegen:oid_c` to regenerate the C table.
#   4. Run `bundle exec rake compile` to rebuild the extension.
#
# Field descriptions:
#   dotted:          OID in dotted-decimal notation
#   family:          Algorithm family (ML-DSA, ML-KEM, SLH-DSA)
#   standard:        NIST standard defining the algorithm
#   security:        Security level in bits
#   public_key_size: Expected public key size in bytes (SPKI)
#   secret_key_size: Expected secret key size in bytes (PKCS#8)
#
# Sources (verified 2026-03-14):
#   ML-DSA:  NIST FIPS 204, Table 2; NIST CSOR OID arc 2.16.840.1.101.3.4.3
#   ML-KEM:  NIST FIPS 203; NIST CSOR OID arc 2.16.840.1.101.3.4.4
#   SLH-DSA: NIST FIPS 205, Table 2; NIST CSOR OID arc 2.16.840.1.101.3.4.3
---
